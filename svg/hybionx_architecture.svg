<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#f8fafc" />
  
  <!-- Title -->
  <text x="500" y="50" font-family="sans-serif" font-size="28" font-weight="bold" fill="#0f172a" text-anchor="middle">HybionX (EduQA) - System Architecture</text>
  <text x="500" y="80" font-family="sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Explainable Educational QA API (Neuro-Symbolic Pipeline)</text>

  <!-- ==================== NODES ==================== -->
  
  <!-- Client -->
  <rect x="400" y="120" width="200" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="155" font-family="sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Client Application</text>

  <!-- FastAPI -->
  <rect x="400" y="240" width="200" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e3a8a" text-anchor="middle">FastAPI (Web API)</text>
  <text x="500" y="295" font-family="sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">Pydantic v2 / Async Endpoints</text>

  <!-- Redis Job Store -->
  <rect x="700" y="240" width="200" height="80" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7f1d1d" text-anchor="middle">Redis (Job Queue)</text>
  <text x="800" y="295" font-family="sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">Store Jobs / Artifacts</text>

  <!-- Async Worker (arq) -->
  <rect x="400" y="380" width="200" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="415" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Async Worker (arq)</text>
  <text x="500" y="435" font-family="sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">Pipeline Orchestrator</text>

  <!-- Qdrant (RAG) -->
  <rect x="100" y="520" width="220" height="90" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="555" font-family="sans-serif" font-size="16" font-weight="bold" fill="#14532d" text-anchor="middle">Qdrant Vector DB</text>
  <text x="210" y="575" font-family="sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Dense &amp; Sparse Retrieval</text>
  <text x="210" y="590" font-family="sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">(SentenceTransformers)</text>

  <!-- Reasoning Engines -->
  <rect x="390" y="520" width="220" height="90" rx="8" fill="#fdf4ff" stroke="#d946ef" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="555" font-family="sans-serif" font-size="16" font-weight="bold" fill="#701a75" text-anchor="middle">Reasoning Engines</text>
  <text x="500" y="575" font-family="sans-serif" font-size="12" fill="#d946ef" text-anchor="middle">SymPy (Physics Math)</text>
  <text x="500" y="590" font-family="sans-serif" font-size="12" fill="#d946ef" text-anchor="middle">Z3 (Logic Verification)</text>

  <!-- LLM Backends -->
  <rect x="680" y="520" width="220" height="90" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="555" font-family="sans-serif" font-size="16" font-weight="bold" fill="#78350f" text-anchor="middle">LLM Backend</text>
  <text x="790" y="575" font-family="sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">RunPod (Qwen2.5-7B)</text>
  <text x="790" y="590" font-family="sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">OpenAI (GPT-4o-mini)</text>

  <!-- ==================== EDGES ==================== -->

  <!-- Client to FastAPI -->
  <path d="M 500 180 L 500 230" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="210" font-family="sans-serif" font-size="12" fill="#64748b">HTTP POST / GET</text>

  <!-- FastAPI to Redis -->
  <path d="M 600 280 L 690 280" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="645" y="270" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Enqueue Job</text>

  <!-- Redis to FastAPI -->
  <!-- <path d="M 700 290 L 600 290" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/> -->
  
  <!-- Redis to Worker -->
  <path d="M 800 320 L 800 420 L 610 420" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="810" y="375" font-family="sans-serif" font-size="12" fill="#64748b">Polls jobs</text>

  <!-- Worker to Redis (Update Status) -->
  <path d="M 600 395 L 750 395 L 750 325" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="675" y="385" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Update status/artifact</text>

  <!-- Worker to Qdrant -->
  <path d="M 450 460 L 250 460 L 250 510" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="450" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">1. Retrieve Context</text>

  <!-- Worker to Reasoning Engines -->
  <path d="M 500 460 L 500 510" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="490" font-family="sans-serif" font-size="12" fill="#64748b">2. Logic &amp; Math</text>

  <!-- Worker to LLM -->
  <path d="M 550 460 L 790 460 L 790 510" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="670" y="450" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">3. Synthesize Output</text>

</svg>
