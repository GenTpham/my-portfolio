<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 750" width="100%" height="100%">
  <!-- Background -->
  <rect width="950" height="750" fill="#1E1E2E" rx="10"/>
  
  <style>
    .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 24px; font-weight: bold; fill: #FFFFFF; }
    .subtitle { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; fill: #A6ACCD; }
    .box-title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
    .box-text { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; fill: #D9E0EE; text-anchor: middle; }
    .layer-title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #F8BD96; }
    
    .bg-layer { fill: #282A36; stroke: #44475A; stroke-width: 2; rx: 8; }
    .bg-api { fill: #383A59; stroke: #6272A4; stroke-width: 2; rx: 6; }
    .bg-service { fill: #44475A; stroke: #8BE9FD; stroke-width: 1.5; rx: 4; }
    .bg-db { fill: #44475A; stroke: #F1FA8C; stroke-width: 1.5; rx: 4; }
    .bg-external { fill: #282A36; stroke: #FF79C6; stroke-width: 2; rx: 6; stroke-dasharray: 5, 5; }
    
    .arrow { stroke: #6272A4; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-dashed { stroke: #6272A4; stroke-width: 2; fill: none; stroke-dasharray: 4, 4; marker-end: url(#arrowhead); }
    .arrow-data { stroke: #F1FA8C; stroke-width: 2; fill: none; marker-end: url(#arrowhead-data); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6272A4" />
    </marker>
    <marker id="arrowhead-data" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F1FA8C" />
    </marker>
  </defs>

  <!-- Headers -->
  <text x="30" y="40" class="title">ATN Beink API - System Architecture</text>
  <text x="30" y="65" class="subtitle">AI-Powered Design for Manufacturing &amp; Multi-modal API System</text>

  <!-- External Clients Layer -->
  <rect x="30" y="150" width="180" height="250" class="bg-external" />
  <text x="120" y="180" class="box-title" fill="#FF79C6">External Clients</text>
  
  <rect x="50" y="210" width="140" height="50" class="bg-api" />
  <text x="120" y="235" class="box-title">Web App / UI</text>
  <text x="120" y="250" class="box-text">HTTP / REST</text>
  
  <rect x="50" y="280" width="140" height="50" class="bg-api" />
  <text x="120" y="305" class="box-title">IoT / Devices</text>
  <text x="120" y="320" class="box-text">MQTT</text>

  <rect x="50" y="350" width="140" height="30" class="bg-api" />
  <text x="120" y="370" class="box-text">3D Viewer / Clients</text>

  <!-- Core Backend Layer -->
  <rect x="280" y="110" width="400" height="480" class="bg-layer" />
  <text x="300" y="140" class="layer-title">FastAPI Backend (Docker Container)</text>
  
  <!-- Ingress -->
  <rect x="300" y="160" width="360" height="60" class="bg-api" />
  <text x="480" y="185" class="box-title">API Router &amp; Endpoints</text>
  <text x="480" y="205" class="box-text">/chat-to-cad, /process-pdf, /process-step, /3d-viewer</text>

  <rect x="300" y="230" width="360" height="40" class="bg-api" />
  <text x="480" y="255" class="box-title">MQTT Listener</text>

  <!-- Processors -->
  <rect x="300" y="290" width="170" height="80" class="bg-service" />
  <text x="385" y="320" class="box-title">CAD Processor</text>
  <text x="385" y="340" class="box-text">FreeCAD / Sheetmetal</text>
  <text x="385" y="355" class="box-text">Manufacturability Analysis</text>

  <rect x="490" y="290" width="170" height="80" class="bg-service" />
  <text x="575" y="320" class="box-title">Multimodal Processor</text>
  <text x="575" y="340" class="box-text">PDF / Image Extraction</text>
  <text x="575" y="355" class="box-text">OCR &amp; Vision</text>

  <!-- RAG Engine -->
  <rect x="300" y="390" width="360" height="80" class="bg-service" />
  <text x="480" y="420" class="box-title">RAG Engine</text>
  <text x="480" y="440" class="box-text">Retriever, Embedder, Chunking Strategy</text>
  <text x="480" y="455" class="box-text">Structured Data Loader</text>

  <!-- LLM Orchestrator -->
  <rect x="300" y="490" width="360" height="60" class="bg-service" />
  <text x="480" y="520" class="box-title">LLM &amp; Chat Orchestrator</text>
  <text x="480" y="535" class="box-text">Context Assembly &amp; Prompt Engineering</text>

  <!-- External AI Services -->
  <rect x="750" y="390" width="170" height="120" class="bg-external" />
  <text x="835" y="420" class="box-title" fill="#FF79C6">External AI</text>
  <rect x="765" y="435" width="140" height="30" class="bg-api" />
  <text x="835" y="455" class="box-text">OpenAI API</text>
  <rect x="765" y="470" width="140" height="30" class="bg-api" />
  <text x="835" y="490" class="box-text">Gemini API</text>

  <!-- Database Layer -->
  <rect x="280" y="610" width="400" height="110" class="bg-layer" />
  <text x="300" y="640" class="layer-title">Data &amp; Persistence</text>

  <rect x="300" y="650" width="170" height="50" class="bg-db" />
  <text x="385" y="670" class="box-title">MySQL 8.0</text>
  <text x="385" y="685" class="box-text">Sessions / Metadata</text>

  <rect x="490" y="650" width="170" height="50" class="bg-db" />
  <text x="575" y="670" class="box-title">FAISS Vector Store</text>
  <text x="575" y="685" class="box-text">Embeddings Index</text>

  <!-- Connections -->
  
  <!-- Clients -> API -->
  <path d="M 190 235 L 295 190" class="arrow" />
  <path d="M 190 305 L 295 250" class="arrow" />
  <path d="M 190 365 L 295 210" class="arrow" />

  <!-- API Routes -> Services -->
  <path d="M 480 220 L 480 285" class="arrow" />
  <path d="M 480 270 L 385 285" class="arrow" />
  <path d="M 480 270 L 575 285" class="arrow" />
  
  <!-- Services -> RAG/LLM -->
  <path d="M 385 370 L 400 385" class="arrow" />
  <path d="M 575 370 L 550 385" class="arrow" />
  <path d="M 480 470 L 480 485" class="arrow" />

  <!-- LLM -> External APIs -->
  <path d="M 660 520 L 745 450" class="arrow-dashed" />
  <path d="M 660 520 L 745 485" class="arrow-dashed" />

  <!-- RAG Engine -> Databases -->
  <path d="M 575 470 L 575 645" class="arrow-data" />
  
  <!-- API/Orchestrator -> MySQL -->
  <path d="M 385 550 L 385 645" class="arrow-data" />

</svg>
