<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="api-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4e73df"/>
      <stop offset="100%" stop-color="#224abe"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1cc88a"/>
      <stop offset="100%" stop-color="#13855c"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6c23e"/>
      <stop offset="100%" stop-color="#dda20a"/>
    </linearGradient>
    <linearGradient id="se-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74a3b"/>
      <stop offset="100%" stop-color="#be2617"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="5" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10"/>

  <!-- Title -->
  <text x="500" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#333" text-anchor="middle">SE Auto-Draw: Architecture &amp; Product Diagram</text>

  <!-- Client Layer -->
  <rect x="50" y="100" width="900" height="80" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="500" y="145" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#555" text-anchor="middle">External Clients (ERP, PLM, MES, Web Portal)</text>

  <!-- Flow Arrow from Client to API -->
  <path d="M 500 180 L 500 220" stroke="#888" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- API Layer -->
  <rect x="50" y="230" width="900" height="120" rx="10" fill="url(#api-grad)" filter="url(#shadow)"/>
  <text x="500" y="260" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">FastAPI (REST API Service)</text>
  
  <rect x="80" y="280" width="260" height="50" rx="5" fill="#fff" fill-opacity="0.9"/>
  <text x="210" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">/api/export (Pipeline)</text>
  
  <rect x="370" y="280" width="260" height="50" rx="5" fill="#fff" fill-opacity="0.9"/>
  <text x="500" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">/api/dimensions/ai-layout</text>

  <rect x="660" y="280" width="260" height="50" rx="5" fill="#fff" fill-opacity="0.9"/>
  <text x="790" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">/api/assembly/generate</text>

  <!-- Flow Arrows -->
  <path d="M 500 350 L 500 390" stroke="#888" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Application Logic Layer -->
  <rect x="50" y="400" width="900" height="160" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="500" y="430" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#555" text-anchor="middle">Core Processing &amp; AI Layer</text>

  <!-- AI Agent -->
  <rect x="80" y="450" width="260" height="90" rx="5" fill="url(#ai-grad)" filter="url(#shadow)"/>
  <text x="210" y="480" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">AI Agentic Workflow</text>
  <text x="210" y="505" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">ReAct Agent Loop</text>
  <text x="210" y="525" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Vision (OpenAI) + Scorer</text>

  <!-- Business Logic -->
  <rect x="370" y="450" width="260" height="90" rx="5" fill="url(#core-grad)" filter="url(#shadow)"/>
  <text x="500" y="480" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Drawing Logic</text>
  <text x="500" y="505" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Views &amp; Dimensions</text>
  <text x="500" y="525" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Assembly &amp; BOM Extraction</text>

  <!-- Interface/Adapters -->
  <rect x="660" y="450" width="260" height="90" rx="5" fill="#858796" filter="url(#shadow)"/>
  <text x="790" y="480" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">COM Interfaces</text>
  <text x="790" y="505" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Adapter Pattern</text>
  <text x="790" y="525" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Real vs Mock Adapters</text>

  <!-- Flow Arrows -->
  <path d="M 500 560 L 500 600" stroke="#888" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Solid Edge Automation Layer -->
  <rect x="50" y="610" width="900" height="150" rx="10" fill="url(#se-grad)" filter="url(#shadow)"/>
  <text x="500" y="640" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">Solid Edge COM Automation (STA Threading)</text>
  
  <rect x="250" y="660" width="500" height="70" rx="5" fill="#fff" fill-opacity="0.9"/>
  <text x="500" y="690" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">COM Manager (ThreadPoolExecutor: max_workers=1)</text>
  <text x="500" y="715" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">.par (Part) | .asm (Assembly) | .dft (Draft) | PDF / DXF Exports</text>

</svg>
